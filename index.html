<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Qify</title>
  <link rel="icon" type="image/png" href="img/qify-icon.png">
  <script type="module" src="/src/main.ts"></script>
  <!-- External CSS for better organization -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="header">
  <img src="img/qify-header.png" alt="Qify Logo" class="logo" height="50">
  <div>
    <span id="status" class="status">Ready</span>
    <button onclick="toggleExamples()">Examples ▼</button>
  </div>
</div>

<div class="examples" id="examples">
  <button onclick="loadExample('basic')">Basic Example</button>
  <button onclick="loadExample('ecommerce')">E-commerce System</button>
  <button onclick="loadExample('healthcare')">Healthcare System</button>
  <button onclick="loadExample('iot')">IoT System</button>
</div>

<div class="container">
  <div class="editor code-editor">
    <div class="editor-container">
      <div id="lineNumbers" class="line-numbers"></div>
      <div id="syntaxHighlight" class="syntax-highlight"></div>
      <textarea id="code" placeholder='Enter your Quality Attribute DSL here...

Example:
system Ecommerce

attribute PerformanceCheckout {
  artifact: "CheckoutService"
  category: PerformanceEfficiency.TimeBehaviour
  
  source: "external user"
  stimulus: "1000 concurrent users"
  environment: "peak hours"
  response: "response time < 2s"
  measure: "latency percentile p95"
}'></textarea>
    </div>

    <div class="toolbar">
      <button onclick="exportPNG()">Export PNG</button>
      <button onclick="exportSVG()">Export SVG</button>
      <button onclick="downloadCode()">Download .qify</button>
      <button onclick="importCode()">Import .qify</button>
      <input type="file" id="fileInput" accept=".qify" style="display: none;" onchange="handleFileImport(event)">
    </div>
    <div id="errorPanel" class="error-panel">
      <div class="error-header">
        <span>Errors</span>
        <button onclick="copyErrors()" class="copy-button">Copy</button>
      </div>
      <div id="errorList" class="error-list"></div>
    </div>
  </div>

  <div class="preview">
    <div id="visualization" class="visualization"></div>
    <canvas id="canvas" width="800" height="600"></canvas>
  </div>
</div>

</body>
<script>
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  document.addEventListener('dragstart', function(e) {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
    }
  });

  // Canvas dragging functionality
  let isDragging = false;
  let startX, startY;
  let scrollLeft, scrollTop;
  let currentX = 0, currentY = 0;

  const visualization = document.getElementById('visualization');
  
  visualization.addEventListener('mousedown', function(e) {
    // Only start dragging with left mouse button
    if (e.button === 0) {
      isDragging = true;
      startX = e.pageX - currentX;
      startY = e.pageY - currentY;
      visualization.style.cursor = 'grabbing';
      visualization.style.userSelect = 'none';
      e.preventDefault();
    }
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    
    e.preventDefault();
    currentX = e.pageX - startX;
    currentY = e.pageY - startY;
    
    const diagramTemplate = visualization.querySelector('.diagram-template');
    if (diagramTemplate) {
      diagramTemplate.style.transform = `translate(${currentX}px, ${currentY}px)`;
    }
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      visualization.style.cursor = 'grab';
      visualization.style.userSelect = 'auto';
    }
  });

  // Prevent text selection while dragging
  visualization.addEventListener('selectstart', function(e) {
    if (isDragging) {
      e.preventDefault();
    }
  });
</script>
</html>
